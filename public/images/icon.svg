<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#263494"/>
      <stop offset="100%" stop-color="#17215E"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A50C0"/>
      <stop offset="100%" stop-color="#263494"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .shine { fill: white; fill-opacity: 0.08; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: url(#bgDark); }
      }
    </style>
  </defs>

  <!-- Background rounded square -->
  <rect width="180" height="180" rx="38" class="bg"/>
  <!-- Subtle shine top-left -->
  <ellipse cx="45" cy="38" rx="70" ry="50" class="shine"/>

  <!-- Bold M monogram (white paths) -->
  <!-- Points: bottom-left-out → top-left → notch-left → center-V-low → notch-right → top-right → bottom-right-out → bottom-right-in → center-V-high → bottom-left-in -->
  <polygon
    points="22,146 22,34 50,34 90,92 130,34 158,34 158,146 130,146 90,70 50,146"
    fill="white"
  />

  <!-- Gold accent bar -->
  <rect x="60" y="156" width="60" height="8" rx="4" fill="#C08D18"/>
</svg>